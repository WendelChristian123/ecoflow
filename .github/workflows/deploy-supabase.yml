name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-supabase.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_ID: fetbelqmlgjvmcondxzk

    steps:
      - uses: actions/checkout@v3

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy admin-create-user function
        run: supabase functions deploy admin-create-user --project-ref $PROJECT_ID
        continue-on-error: true

      - name: Deploy create-tenant-admin function
        run: supabase functions deploy create-tenant-admin --project-ref $PROJECT_ID
        continue-on-error: true

      - name: Deploy billing-checkout
        run: npx supabase functions deploy billing-checkout --project-ref fetbelqmlgjvmcondxzk --no-verify-jwt
        continue-on-error: true

      - name: Deploy cancel function
        run: supabase functions deploy billing-cancel --project-ref $PROJECT_ID
        continue-on-error: true

      - name: Deploy upgrade function
        run: supabase functions deploy billing-upgrade --project-ref $PROJECT_ID
        continue-on-error: true

      - name: Deploy schedule-downgrade function
        run: supabase functions deploy billing-schedule-downgrade --project-ref $PROJECT_ID
        continue-on-error: true

      - name: Deploy process-changes function
        run: supabase functions deploy billing-process-scheduled-changes --project-ref $PROJECT_ID
        continue-on-error: true

      - name: Deploy sync status function
        run: supabase functions deploy billing-sync-status --project-ref $PROJECT_ID
        continue-on-error: true

      - name: Deploy ASAAS webhooks function
        run: supabase functions deploy webhooks-asaas --no-verify-jwt --project-ref $PROJECT_ID
        continue-on-error: true

      - name: Deploy push-cron
        run: supabase functions deploy push-cron --no-verify-jwt --project-ref $PROJECT_ID
        continue-on-error: true

      - name: Deploy push-notify
        run: supabase functions deploy push-notify --no-verify-jwt --project-ref $PROJECT_ID
        continue-on-error: true

