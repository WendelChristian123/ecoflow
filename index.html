<!DOCTYPE html>
<html lang="pt-BR" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https://* data: blob:;">
  <!--
    PWA Status Bar — Limitações conhecidas:
    • Android/Chrome: theme-color funciona perfeitamente para colorir a status bar.
    • iOS/Safari (standalone): theme-color é IGNORADO. O controle real é via
      apple-mobile-web-app-status-bar-style (default | black | black-translucent).
      Com black-translucent, a área fica transparente e o conteúdo renderiza por baixo,
      exigindo viewport-fit=cover + safe-area-inset-top no CSS.
    • Não é possível alterar a cor da status bar por rota apenas via manifest — somente
      via <meta name="theme-color"> manipulado por JS (Chrome sim, Safari não).
  -->
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Contazze" />
  <link rel="apple-touch-icon" href="/pwa-192x192.png" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="/pwa-192x192.png" />
  <title>Contazze</title>
  <script>
    // Catch the PWA install event early before React mounts
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      window.__deferredPwaPrompt = e;
    });
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
